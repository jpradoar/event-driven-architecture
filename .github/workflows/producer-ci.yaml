name: Producer-CI
on:
  push:
    branches:
      - main
    paths:
      - '03-producer/**' # Any change in this path, make trigger build action.
      - '.github/workflows/producer-ci.yaml'

env:
  APP: 'mqtt-producer'
  IMAGE_TAG: 'latest'

jobs:
  Producer-CI_build-docker-image:
    runs-on: ubuntu-latest 
    
    steps:
     
    - name: Checkout
      uses: actions/checkout@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}


    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Generate tag ID
      id: tag_id
      run: echo $(date +%s) > $IMAGE_TAG

    - name: Build and push
      uses: docker/build-push-action@v4
      with:
        context: ./03-producer
        push: true
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.CLUSTER_NAME }}:${{ steps.tag_id.outputs.stdout }}

