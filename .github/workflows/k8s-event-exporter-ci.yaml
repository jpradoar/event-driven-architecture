name: k8s-event-exporter-CI
on:
  push:
    branches:
      - main
    paths:
      - '12-k8s-event-exporter/**' # Any change in this path, make trigger build action.
      - '.github/workflows/k8s-event-exporter-ci.yaml'

env:
  REPO_APP: 'k8s-event-exporter'

jobs:
  k8s-event-exporter-CI_build-docker-image:
    runs-on: ubuntu-latest 
    
    steps:
     
    - name: Checkout
      uses: actions/checkout@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Generate tag ID
      id: tag_id
      run: echo "::set-output name=IMAGE_TAG::$(date +%Y.%m)"

    - name: Build and push
      uses: docker/build-push-action@v4
      with:
        context: ./12-k8s-event-exporter
        push: true
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.REPO_APP }}:${{ steps.tag_id.outputs.IMAGE_TAG }}

    - name: Slack Notification
      uses: rtCamp/action-slack-notify@v2
      env:
        SLACK_CHANNEL: builds-and-ci
        SLACK_COLOR: ${{ job.status }} # or a specific color like 'good' or '#ff00ff'
        #SLACK_ICON: https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png?size=48
        SLACK_MSG_AUTHOR: 
        SLACK_MESSAGE: 'New docker image was created: *${{ env.REPO_APP }}:${{ steps.tag_id.outputs.IMAGE_TAG }}*'
        SLACK_TITLE: k8s-event-exporter-CI
        SLACK_USERNAME: GithubAction
        SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}