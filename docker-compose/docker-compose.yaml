version: "3"
services:
#--------------------------------------------  
    rabbitmq:
        container_name: rabbitmq
        image: rabbitmq:management-alpine
        restart: always
        volumes:
          - $PWD/rabbitmq:/etc/rabbitmq/
        ports:
          - 15672:15672   # http (web admin)
          - 5672:5672     # amqp 
          - 15692         # url/:15692/metrics  (prometheus metrics)
          - 25672         # clustering
          - 15675         # http/web-mqtt
          - 1883          # mqtt
          - 61613         # stomp
        networks:
          - infra
#--------------------------------------------
    producer:
        image: jpradoar/mqtt-producer:2023.05
        container_name: producer
        restart: always
        ports:
          - 5000:5000   
          - 9091  
        depends_on:
          - rabbitmq
        networks:
          - infra       
#--------------------------------------------
    mariadb:
      image: mariadb:10.9.4
      container_name: mariadb
      restart: always
      environment:
        MARIADB_ROOT_PASSWORD: xadmin
        MARIADB_USER: admin
        MARIADB_PASSWORD: admin
        MARIADB_DATABASE: clients
      volumes: 
        - ./dump.sql:/docker-entrypoint-initdb.d/dump.sql:ro
      depends_on: 
       - rabbitmq
       - producer        
      ports:
        - 3306        
      networks:
        - infra         
#--------------------------------------------          
    webserver:
      image: jpradoar/mqtt-webserver:2023.05
      container_name: webserver
      restart: always   
      ports:
         - 8080:80
      depends_on: 
         - mariadb          
      networks:
        - infra              
#--------------------------------------------
    consumer:
        image: jpradoar/mqtt-consumer:2023.05
        container_name: consumer
        restart: always
        environment:
          mqttuser: admin
          mqttpass: admin          
        ports:
          - 9090        # /metrics                
        depends_on: 
          - rabbitmq
          - producer
        networks:
          - infra
      
#--------------------------------------------
    dbwriter:
      image: jpradoar/mqtt-dbwriter:2023.05
      container_name: dbwriter
      restart: always       
      environment:
        mqttuser: admin
        mqttpass: admin    
        queue: clients     
      ports:
        - 9090          
      depends_on: 
        - rabbitmq
        - producer
        - consumer          
        - mariadb          
      networks:
        - infra         
#----------------------------------------------------------------
networks:
  infra:
    driver: bridge 

