---
apiVersion: v1
kind: Service
metadata:
  name: producer
  namespace: mqtt-poc
  labels:
    app: producer
    app.depends: rabbitmq     
    environment: development
  annotations:
    #prometheus.io/scrape: 'true'
    #filter.by.port.name: 'true'
    app: producer
    app.depends: rabbitmq     
    app.business.client: 'client-001'
    app.mqtt.event.trigger: '1234567890'    
    #app.owner: 'jpradoar'
    #app.imageregistry: 'https://hub.docker.com/repository/docker/jpradoar/'   
spec:
  selector:
    app: producer
  ports:
    - name: http
      protocol: TCP     
      port: 5000        
      targetPort: 5000


---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: producer
  namespace: mqtt-poc
  labels:
    app: producer
    environment: development
    app.depends: rabbitmq    
  annotations:
    #prometheus.io/scrape: 'true'
    app: producer
    app.depends: rabbitmq  
    app.business.client: 'client-001'
    app.mqtt.event.trigger: '1234567890'    
    #app.owner: 'jpradoar'
    #app.imageregistry: 'https://hub.docker.com/repository/docker/jpradoar/'   
spec:
  replicas: 1
  selector:
    matchLabels:
      app: producer
  template:
    metadata:
      labels:
        app: producer
    spec:
      containers:
        - name: producer
          image: jpradoar/mqtt-producer:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 5000
          env:
          - name: mqtthost
            value: "rabbitmq"          
          - name: mqttvhost
            value: "/"
          - name: mqttuser
            value: "admin" 
          - name: mqttpass
            value: "admin" 
          - name: queue
            value: "clients"              
