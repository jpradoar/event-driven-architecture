---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dbwriter
  namespace: mqtt-poc
  labels:
    app: dbwriter
    app.depends: rabbitmq  
    environment: development
  annotations:
    prometheus.io/scrape: 'true'
    app: dbwriter
    app.depends: rabbitmq  
    app.business.client: 'client-001'
    app.mqtt.event.trigger: '1234567890'    
    #app.owner: 'jpradoar'
    #app.imageregistry: 'https://hub.docker.com/repository/docker/jpradoar/'   
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dbwriter
  template:
    metadata:
      labels:
        app: dbwriter
    spec:
      containers:
        - name: dbwriter
          image: jpradoar/dbwriter:latest
          imagePullPolicy: Always   
          env:
          - name: mqtthost
            value: "rabbitmq"
          - name: mqttvhost
            value: "/"
          - name: mqttuser
            value: "admin" 
          - name: mqttpass
            value: "admin" 
          - name: queue
            value: "clients"
          - name: mysql_host
            value: "mariadb"
          - name: mysql_user
            value: "admin"
          - name: mysql_pass
            value: "admin"
          - name: mysql_db
            value: "clients"
          volumeMounts:
            - name: dbpy
              mountPath: /root/db.py
              subPath: db.py
      volumes:
        - name: dbpy
          configMap:
            name: dbpy
